<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - IshiTrackers</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="logo-dot"></span> IshiTrackers</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a href="map.html"><span class="icon">🗺️</span> Live Map</a>
      <a href="history.html"><span class="icon">🛣️</span> History</a>
      <a href="profile.html" class="active"><span class="icon">👤</span> Profile</a>
      <a href="admin.html" id="adminLink" style="display:none;"><span class="icon">⚙️</span> Admin Panel</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-outline btn-block" onclick="logout()">Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px;">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <h1>Profile</h1>
      </div>
    </div>

    <div class="page-body">
      <div class="grid grid-2">
        <div class="card">
          <h3 style="margin-bottom:18px;">Account Details</h3>
          <div class="success-msg" id="successMsg"></div>
          <div class="error-msg" id="errorMsg"></div>
          <form id="profileForm">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="name" required>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="email" disabled>
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="phone">
            </div>
            <div class="form-group">
              <label>Role</label>
              <input type="text" id="role" disabled>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>

        <div class="card">
          <h3 style="margin-bottom:18px;">Change Password</h3>
          <div class="error-msg" id="pwErrorMsg"></div>
          <div class="success-msg" id="pwSuccessMsg"></div>
          <form id="passwordForm">
            <div class="form-group">
              <label>Current Password</label>
              <input type="password" id="currentPassword" required>
            </div>
            <div class="form-group">
              <label>New Password</label>
              <input type="password" id="newPassword" required minlength="6">
            </div>
            <button type="submit" class="btn btn-outline">Update Password</button>
          </form>

          <h3 style="margin:28px 0 14px;">Assigned Trackers</h3>
          <div id="deviceListProfile" class="text-muted">Loading...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

let currentUser, currentProfile;

requireAuth((user, profile) => {
  currentUser = user;
  currentProfile = profile;
  if (profile.role === 'admin') document.getElementById('adminLink').style.display = 'flex';

  document.getElementById('name').value = profile.name || '';
  document.getElementById('email').value = profile.email || user.email;
  document.getElementById('phone').value = profile.phone || '';
  document.getElementById('role').value = profile.role;

  const devices = profile.devices || [];
  document.getElementById('deviceListProfile').innerHTML = devices.length
    ? devices.map(d => `<span class="badge badge-online" style="margin:3px;display:inline-flex;">${d}</span>`).join('')
    : 'No trackers assigned.';
});

document.getElementById('profileForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();

  db.ref('users/' + currentUser.uid).update({ name, phone })
    .then(() => {
      currentUser.updateProfile({ displayName: name });
      showMsg('successMsg', 'Profile updated successfully.');
    })
    .catch((err) => showMsg('errorMsg', err.message));
});

document.getElementById('passwordForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const currentPassword = document.getElementById('currentPassword').value;
  const newPassword = document.getElementById('newPassword').value;

  const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, currentPassword);
  currentUser.reauthenticateWithCredential(cred)
    .then(() => currentUser.updatePassword(newPassword))
    .then(() => {
      showMsg('pwSuccessMsg', 'Password updated successfully.');
      document.getElementById('passwordForm').reset();
    })
    .catch((err) => showMsg('pwErrorMsg', err.message));
});

function showMsg(id, text) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}
</script>
</body>
</html>
