<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Route History - IshiTrackers</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  .leaflet-popup-content-wrapper { background: #161e2e; color: #e8edf6; }
  .leaflet-popup-tip { background: #161e2e; }
  .leaflet-control-zoom a { background: #161e2e !important; color: #fff !important; border-color: #232d42 !important; }
  #historyMap { width: 100%; height: 420px; border-radius: var(--radius); border: 1px solid var(--border-color); }
  .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; }
  .filter-bar .form-group { margin-bottom: 0; min-width: 160px; }
  .playback-controls { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  .playback-controls input[type=range] { flex: 1; }
</style>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="logo-dot"></span> IshiTrackers</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a href="map.html"><span class="icon">🗺️</span> Live Map</a>
      <a href="history.html" class="active"><span class="icon">🛣️</span> History</a>
      <a href="profile.html"><span class="icon">👤</span> Profile</a>
      <a href="admin.html" id="adminLink" style="display:none;"><span class="icon">⚙️</span> Admin Panel</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-outline btn-block" onclick="logout()">Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px;">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <h1>Route History</h1>
      </div>
    </div>

    <div class="page-body">
      <div class="card">
        <div class="filter-bar">
          <div class="form-group">
            <label>Device</label>
            <select id="deviceSelect"><option>Loading...</option></select>
          </div>
          <div class="form-group">
            <label>From</label>
            <input type="date" id="fromDate">
          </div>
          <div class="form-group">
            <label>To</label>
            <input type="date" id="toDate">
          </div>
          <button class="btn btn-primary" id="loadHistoryBtn">Load Route</button>
        </div>

        <div id="historyMap"></div>

        <div class="playback-controls" id="playbackControls" style="display:none;">
          <button class="btn btn-outline btn-sm" id="playBtn">▶ Play</button>
          <input type="range" id="playbackSlider" min="0" max="100" value="0">
          <span id="playbackLabel" style="font-size:13px;color:var(--text-secondary);min-width:140px;">—</span>
        </div>

        <div class="empty-state" id="historyEmpty">
          <div class="e-icon">🛣️</div>
          <p>Select a device and date range, then click "Load Route" to view trip history.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

let hMap, routeLine, playbackMarker;
let routePoints = [];
let playInterval = null;

function initHistoryMap() {
  hMap = L.map('historyMap').setView([16.5062, 80.6480], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
  }).addTo(hMap);
}

requireAuth((user, profile) => {
  if (profile.role === 'admin') document.getElementById('adminLink').style.display = 'flex';
  initHistoryMap();

  const select = document.getElementById('deviceSelect');
  const isAdmin = profile.role === 'admin';

  const loadDevices = (ids) => {
    select.innerHTML = ids.length
      ? ids.map(id => `<option value="${id}">${id}</option>`).join('')
      : '<option>No devices</option>';
  };

  if (isAdmin) {
    db.ref('devices').once('value').then((snap) => loadDevices(Object.keys(snap.val() || {})));
  } else {
    loadDevices(profile.devices || []);
  }

  // Default date range: last 7 days
  const today = new Date();
  const weekAgo = new Date(today.getTime() - 7 * 86400000);
  document.getElementById('toDate').value = today.toISOString().split('T')[0];
  document.getElementById('fromDate').value = weekAgo.toISOString().split('T')[0];
});

document.getElementById('loadHistoryBtn').addEventListener('click', () => {
  const deviceId = document.getElementById('deviceSelect').value;
  const fromDate = new Date(document.getElementById('fromDate').value).getTime();
  const toDate = new Date(document.getElementById('toDate').value).getTime() + 86400000; // inclusive end of day

  if (!deviceId) { alert('Select a device first.'); return; }

  // NOTE: This assumes a "history/{deviceId}/{pushId}" path with {lat, lon, speed, timestamp}
  // populated by your device-write Cloud Function (see API docs section in deployment guide).
  db.ref('history/' + deviceId)
    .orderByChild('timestamp')
    .startAt(fromDate)
    .endAt(toDate)
    .once('value')
    .then((snap) => {
      routePoints = [];
      snap.forEach((child) => {
        const v = child.val();
        if (v.lat != null && v.lon != null) routePoints.push(v);
      });
      renderRoute();
    });
});

function renderRoute() {
  if (routeLine) hMap.removeLayer(routeLine);
  if (playbackMarker) hMap.removeLayer(playbackMarker);

  const emptyState = document.getElementById('historyEmpty');
  const controls = document.getElementById('playbackControls');

  if (routePoints.length === 0) {
    emptyState.style.display = 'block';
    controls.style.display = 'none';
    return;
  }
  emptyState.style.display = 'none';
  controls.style.display = 'flex';

  const latlngs = routePoints.map(p => [p.lat, p.lon]);
  routeLine = L.polyline(latlngs, { color: '#3b82f6', weight: 4 }).addTo(hMap);
  hMap.fitBounds(routeLine.getBounds(), { padding: [30, 30] });

  L.circleMarker(latlngs[0], { radius: 6, color: '#22c55e', fillOpacity: 1 }).addTo(hMap).bindPopup('Trip start');
  L.circleMarker(latlngs[latlngs.length - 1], { radius: 6, color: '#ef4444', fillOpacity: 1 }).addTo(hMap).bindPopup('Trip end');

  playbackMarker = L.marker(latlngs[0], {
    icon: L.divIcon({ className: '', html: '<div style="width:28px;height:28px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;border:3px solid #0b0f17;">🚗</div>', iconSize: [28,28], iconAnchor:[14,14] })
  }).addTo(hMap);

  const slider = document.getElementById('playbackSlider');
  slider.max = routePoints.length - 1;
  slider.value = 0;
  updatePlaybackLabel(0);

  slider.oninput = () => {
    const idx = parseInt(slider.value, 10);
    playbackMarker.setLatLng(latlngs[idx]);
    updatePlaybackLabel(idx);
  };
}

function updatePlaybackLabel(idx) {
  const p = routePoints[idx];
  const label = document.getElementById('playbackLabel');
  const date = p.timestamp ? new Date(p.timestamp).toLocaleString() : '—';
  label.textContent = `${date} · ${p.speed ?? 0} km/h`;
}

document.getElementById('playBtn').addEventListener('click', () => {
  const btn = document.getElementById('playBtn');
  const slider = document.getElementById('playbackSlider');

  if (playInterval) {
    clearInterval(playInterval);
    playInterval = null;
    btn.textContent = '▶ Play';
    return;
  }

  btn.textContent = '⏸ Pause';
  playInterval = setInterval(() => {
    let idx = parseInt(slider.value, 10);
    if (idx >= routePoints.length - 1) {
      clearInterval(playInterval);
      playInterval = null;
      btn.textContent = '▶ Play';
      return;
    }
    idx++;
    slider.value = idx;
    playbackMarker.setLatLng([routePoints[idx].lat, routePoints[idx].lon]);
    updatePlaybackLabel(idx);
  }, 400);
});
</script>
</body>
</html>
