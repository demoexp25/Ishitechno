<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - IshiTrackers</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="brand"><span style="width:10px;height:10px;border-radius:50%;background:#3b82f6;box-shadow:0 0 10px #3b82f6;display:inline-block;"></span> IshiTrackers</div>
    <h2>Login to your dashboard</h2>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <div style="text-align:right;margin-bottom:18px;">
        <a href="#" id="forgotLink" style="font-size:13px;">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Login</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="register.html">Register</a></p>
    <p class="auth-footer"><a href="index.html">&larr; Back to home</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
const form = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');
const successMsg = document.getElementById('successMsg');
const loginBtn = document.getElementById('loginBtn');

// If already logged in, redirect to dashboard
auth.onAuthStateChanged((user) => {
  if (user) window.location.href = 'dashboard.html';
});

form.addEventListener('submit', (e) => {
  e.preventDefault();
  errorMsg.style.display = 'none';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  loginBtn.disabled = true;
  loginBtn.textContent = 'Logging in...';

  auth.signInWithEmailAndPassword(email, password)
    .then(() => { window.location.href = 'dashboard.html'; })
    .catch((err) => {
      errorMsg.textContent = friendlyError(err.code);
      errorMsg.style.display = 'block';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    });
});

document.getElementById('forgotLink').addEventListener('click', (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) {
    errorMsg.textContent = 'Enter your email above first, then click "Forgot password?".';
    errorMsg.style.display = 'block';
    return;
  }
  auth.sendPasswordResetEmail(email)
    .then(() => {
      successMsg.textContent = 'Password reset email sent to ' + email;
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
    })
    .catch((err) => {
      errorMsg.textContent = friendlyError(err.code);
      errorMsg.style.display = 'block';
    });
});

function friendlyError(code) {
  const map = {
    'auth/invalid-email': 'That email address looks invalid.',
    'auth/user-disabled': 'This account has been disabled.',
    'auth/user-not-found': 'No account found with that email.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/invalid-credential': 'Incorrect email or password.',
    'auth/too-many-requests': 'Too many attempts. Try again later.'
  };
  return map[code] || 'Login failed. Please try again.';
}
</script>
</body>
</html>
