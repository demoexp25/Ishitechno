<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Map - IshiTrackers</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
  .leaflet-popup-content-wrapper { background: #161e2e; color: #e8edf6; }
  .leaflet-popup-tip { background: #161e2e; }
  .leaflet-control-zoom a { background: #161e2e !important; color: #fff !important; border-color: #232d42 !important; }
</style>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="logo-dot"></span> IshiTrackers</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a href="map.html" class="active"><span class="icon">🗺️</span> Live Map</a>
      <a href="history.html"><span class="icon">🛣️</span> History</a>
      <a href="profile.html"><span class="icon">👤</span> Profile</a>
      <a href="admin.html" id="adminLink" style="display:none;"><span class="icon">⚙️</span> Admin Panel</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-outline btn-block" onclick="logout()">Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px;">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <h1>Live Map</h1>
      </div>
      <div style="font-size:13px;color:var(--text-secondary);" id="refreshLabel">Auto-refresh: 10s</div>
    </div>

    <div style="position:relative;">
      <div class="map-sidebar" id="mapSidebar">
        <div style="padding:14px;border-bottom:1px solid var(--border-color);font-weight:600;font-size:13px;">YOUR TRACKERS</div>
        <div id="deviceList"><div class="device-item text-muted">Loading...</div></div>
      </div>
      <div id="map"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

let map, markerCluster;
const deviceMarkers = {};   // deviceId -> marker
const deviceData = {};      // deviceId -> {device, location}
let isAdminUser = false;
let trackedDeviceIds = [];
const REFRESH_MS = 10000;

function initMap() {
  map = L.map('map', { zoomControl: true }).setView([16.5062, 80.6480], 12); // default: Vijayawada
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);
  markerCluster = L.markerClusterGroup();
  map.addLayer(markerCluster);
}

function vehicleIcon(online) {
  return L.divIcon({
    className: '',
    html: `<div style="width:34px;height:34px;border-radius:50%;background:${online ? '#3b82f6' : '#5b6779'};display:flex;align-items:center;justify-content:center;border:3px solid #0b0f17;box-shadow:0 2px 8px rgba(0,0,0,0.4);font-size:16px;">🚗</div>`,
    iconSize: [34, 34],
    iconAnchor: [17, 17]
  });
}

function upsertMarker(id, device, location) {
  if (!location || location.lat == null || location.lon == null) return;
  const online = isOnline(device ? device.lastUpdate : location.timestamp);
  const popupHtml = `
    <div class="map-popup">
      <b>${id}</b><br>
      Status: ${online ? '<span style="color:#22c55e">Online</span>' : '<span style="color:#ef4444">Offline</span>'}<br>
      Speed: ${location.speed ?? 0} km/h<br>
      Battery: ${location.battery ? batteryPercent(location.battery) + '% (' + location.battery.toFixed(2) + 'V)' : '—'}<br>
      Heading: ${location.heading ?? '—'}&deg;<br>
      Updated: ${timeAgo(device ? device.lastUpdate : location.timestamp)}
    </div>`;

  if (deviceMarkers[id]) {
    deviceMarkers[id].setLatLng([location.lat, location.lon]);
    deviceMarkers[id].setIcon(vehicleIcon(online));
    deviceMarkers[id].getPopup().setContent(popupHtml);
  } else {
    const marker = L.marker([location.lat, location.lon], { icon: vehicleIcon(online) });
    marker.bindPopup(popupHtml);
    markerCluster.addLayer(marker);
    deviceMarkers[id] = marker;
  }
}

function renderDeviceList() {
  const list = document.getElementById('deviceList');
  if (trackedDeviceIds.length === 0) {
    list.innerHTML = '<div class="device-item text-muted">No trackers assigned.</div>';
    return;
  }
  list.innerHTML = trackedDeviceIds.map((id) => {
    const d = deviceData[id] || {};
    const loc = d.location || {};
    const online = isOnline(d.device ? d.device.lastUpdate : loc.timestamp);
    return `<div class="device-item" onclick="focusDevice('${id}')">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <b>${id}</b>
        <span class="badge ${online ? 'badge-online' : 'badge-offline'}"><span class="badge-dot"></span>${online ? 'Online' : 'Offline'}</span>
      </div>
      <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">
        ${loc.speed != null ? loc.speed + ' km/h' : '—'} · ${timeAgo(d.device ? d.device.lastUpdate : loc.timestamp)}
      </div>
    </div>`;
  }).join('');
}

function focusDevice(id) {
  const m = deviceMarkers[id];
  if (m) {
    map.setView(m.getLatLng(), 16);
    m.openPopup();
  }
}

function refreshAllDevices() {
  trackedDeviceIds.forEach((id) => {
    Promise.all([
      db.ref('devices/' + id).once('value'),
      db.ref('locations/' + id).once('value')
    ]).then(([devSnap, locSnap]) => {
      const device = devSnap.val();
      const location = locSnap.val();
      deviceData[id] = { device, location };
      upsertMarker(id, device, location);
      renderDeviceList();
    });
  });
}

function init() {
  initMap();
  requireAuth((user, profile) => {
    if (profile.role === 'admin') document.getElementById('adminLink').style.display = 'flex';
    isAdminUser = profile.role === 'admin';

    if (isAdminUser) {
      db.ref('devices').once('value').then((snap) => {
        trackedDeviceIds = Object.keys(snap.val() || {});
        refreshAllDevices();
        setInterval(refreshAllDevices, REFRESH_MS);
      });
    } else {
      trackedDeviceIds = profile.devices || [];
      refreshAllDevices();
      setInterval(refreshAllDevices, REFRESH_MS);
    }

    // Also listen live for instant updates (real-time push in addition to polling)
    setTimeout(() => {
      trackedDeviceIds.forEach((id) => {
        db.ref('locations/' + id).on('value', (snap) => {
          const location = snap.val();
          if (!deviceData[id]) deviceData[id] = {};
          deviceData[id].location = location;
          upsertMarker(id, deviceData[id].device, location);
          renderDeviceList();
        });
      });
    }, 1500);
  });
}

init();
</script>
</body>
</html>
