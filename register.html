<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - IshiTrackers</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="brand"><span style="width:10px;height:10px;border-radius:50%;background:#3b82f6;box-shadow:0 0 10px #3b82f6;display:inline-block;"></span> IshiTrackers</div>
    <h2>Create your account</h2>

    <div class="error-msg" id="errorMsg"></div>

    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" required placeholder="Ravi Kumar">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="+91 90000 00000">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required minlength="6" placeholder="Min 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" required placeholder="Re-enter password">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="registerBtn">Create Account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
const form = document.getElementById('registerForm');
const errorMsg = document.getElementById('errorMsg');
const registerBtn = document.getElementById('registerBtn');

form.addEventListener('submit', (e) => {
  e.preventDefault();
  errorMsg.style.display = 'none';

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) {
    errorMsg.textContent = 'Passwords do not match.';
    errorMsg.style.display = 'block';
    return;
  }

  registerBtn.disabled = true;
  registerBtn.textContent = 'Creating account...';

  auth.createUserWithEmailAndPassword(email, password)
    .then((cred) => {
      const uid = cred.user.uid;
      // Update display name
      cred.user.updateProfile({ displayName: name });
      // Create user profile record in Realtime Database
      return db.ref('users/' + uid).set({
        name: name,
        email: email,
        phone: phone || null,
        role: 'customer',
        devices: [],
        disabled: false,
        createdAt: firebase.database.ServerValue.TIMESTAMP
      });
    })
    .then(() => {
      window.location.href = 'dashboard.html';
    })
    .catch((err) => {
      errorMsg.textContent = friendlyError(err.code);
      errorMsg.style.display = 'block';
      registerBtn.disabled = false;
      registerBtn.textContent = 'Create Account';
    });
});

function friendlyError(code) {
  const map = {
    'auth/email-already-in-use': 'An account with this email already exists.',
    'auth/invalid-email': 'That email address looks invalid.',
    'auth/weak-password': 'Password should be at least 6 characters.'
  };
  return map[code] || 'Registration failed. Please try again.';
}
</script>
</body>
</html>
